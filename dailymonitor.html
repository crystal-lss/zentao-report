<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FMS & GAS 工时监控周报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
.hero{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 50%,#7c3aed 100%);padding:56px 24px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:24px 24px}
.hero h1{font-size:34px;font-weight:800;color:#fff;margin-bottom:6px;position:relative;letter-spacing:-0.5px}
.hero .sub{font-size:15px;color:rgba(255,255,255,.65);position:relative}
.hero .badge{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:5px 18px;font-size:13px;position:relative;backdrop-filter:blur(4px)}
.container{max-width:920px;margin:-24px auto 0;padding:0 24px 60px;position:relative;z-index:2}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:36px}
.card{background:#fff;border-radius:20px;padding:36px 24px 28px;text-align:center;transition:all .25s ease;display:block;text-decoration:none;color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.card:hover{transform:translateY(-6px);box-shadow:0 8px 30px rgba(0,0,0,.1)}
.card:active{transform:translateY(-2px)}
.card.blue::after{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.card.red::after{background:linear-gradient(90deg,#ef4444,#f87171)}
.card.green::after{background:linear-gradient(90deg,#10b981,#34d399)}
.icon-wrap{width:64px;height:64px;margin:0 auto 18px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px}
.card.blue .icon-wrap{background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.card.red .icon-wrap{background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.card.green .icon-wrap{background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.card .title{font-size:19px;font-weight:700;margin-bottom:6px}
.card .desc{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5}
.stats-row{display:flex;justify-content:center;gap:28px}
.stat-item{text-align:center}
.stat-num{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.card.blue .stat-num{color:#3b82f6}
.card.red .stat-num{color:#ef4444}
.card.green .stat-num{color:#10b981}
.tip{text-align:center;color:#94a3b8;font-size:13px}
.tip a{color:#3b82f6;font-weight:600;text-decoration:none;border-bottom:1px dashed #93c5fd}
.tip a:hover{color:#2563eb;border-bottom-color:#2563eb}
.update-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;border-radius:24px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.update-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.update-btn:active{transform:translateY(0)}
.footer{text-align:center;padding:24px 0 0;color:#c0c8d4;font-size:12px}
.footer span{color:#94a3b8}
.history{text-align:center;margin-top:20px}
.history-title{font-size:12px;color:#94a3b8;margin-bottom:10px}
.history-links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.h-link{display:inline-block;background:#fff;border:1px solid #e2e8f0;color:#64748b;border-radius:20px;padding:4px 14px;font-size:12px;text-decoration:none;transition:all .15s}
.h-link:hover{background:#eff6ff;border-color:#bfdbfe;color:#3b82f6}
@media(max-width:720px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hero">
  <h1>FMS & GAS 工时监控周报</h1>
  <p class="sub">销售财务中台 · 格力海外售后</p>
  <button class="update-btn" onclick="refreshData()">🔄 实时刷新禅道数据</button>
  <div id="update-time" style="margin-top:12px;font-size:12px;color:rgba(255,255,255,.5)">数据更新中...</div>
</div>
<div class="container">
  <div class="cards">
    <a class="card blue" href="monitor.html">
      <div class="icon-wrap">📈</div>
      <div class="title">工时达标监控</div>
      <div class="desc">累计工时 · 日志统计 · 团队负载率</div>
      <div class="stats-row">
        <div class="stat-item"><div class="stat-num">37</div><div class="stat-label">监控人数</div></div>
        <div class="stat-item"><div class="stat-num">13</div><div class="stat-label">昨日日志</div></div>
      </div>
    </a>
    <a class="card red" href="overdue.html">
      <div class="icon-wrap">🚨</div>
      <div class="title">延期任务统计</div>
      <div class="desc">全平台超期追踪 · 按人聚合</div>
      <div class="stats-row">
        <div class="stat-item"><div class="stat-num">30</div><div class="stat-label">延期任务</div></div>
        <div class="stat-item"><div class="stat-num">11</div><div class="stat-label">涉及人员</div></div>
      </div>
    </a>
    <a class="card green" href="quality.html">
      <div class="icon-wrap">🛡️</div>
      <div class="title">工时质量监控</div>
      <div class="desc">需求工时预警 · 角色覆盖 · 类型校验</div>
      <div class="stats-row">
        <div class="stat-item"><div class="stat-num">164</div><div class="stat-label">任务分析</div></div>
        <div class="stat-item"><div class="stat-num">27</div><div class="stat-label">缺失预警</div></div>
      </div>
    </a>
  </div>
  <div class="footer"><span>数据来源：FMS(0630/0715/0725/0730/0815/0830) + GAS(服务器迁移/4.5/4.6.1/4.6.2)</span></div>
  <div class="history">
    <div class="history-title">历史周报</div>
    <div class="history-links">
      <a class="h-link" href="history/工时监控日报_2026-07-08.html">07-08</a>
      <a class="h-link" href="history/工时监控日报_2026-07-06.html">07-06</a>
      <a class="h-link" href="history/工时监控日报_2026-07-01.html">07-01</a>
      <a class="h-link" href="history/工时监控日报_2026-06-30.html">06-30</a>
      <a class="h-link" href="history/工时监控日报_2026-06-29.html">06-29</a>
      <a class="h-link" href="history/工时监控日报_2026-06-26.html">06-26</a>
      <a class="h-link" href="history/工时监控日报_2026-06-25.html">06-25</a>
      <a class="h-link" href="history/工时监控日报_2026-06-24.html">06-24</a>
    </div>
  </div>
</div>
<script>
var now = new Date();
var ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
document.getElementById('update-time').textContent = ts + ' 更新';
function refreshData() {
  var btn = document.querySelector('.update-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 刷新中，请稍候...';
  fetch('/api/refresh', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        alert('刷新完成！共 ' + d.people + ' 人。页面将重新加载。');
        location.reload();
      } else {
        alert('刷新失败：' + d.message);
        btn.disabled = false;
        btn.textContent = '🔄 实时刷新禅道数据';
      }
    })
    .catch(function(e) {
      alert('请求失败：' + e.message);
      btn.disabled = false;
      btn.textContent = '🔄 实时刷新禅道数据';
    });
}
</script>
</body>
</html>
